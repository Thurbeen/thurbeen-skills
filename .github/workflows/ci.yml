---
name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        run: find . -name '*.sh' -type f -not -path './.git/*' -exec shellcheck -x -S warning {} +

  common-sh-sync:
    name: common.sh sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify all common.sh copies are identical
        run: |
          canonical="$(find skills -path '*/scripts/common.sh' -type f | head -1)"
          drift=0
          for f in skills/*/scripts/common.sh; do
            if ! diff -q "$canonical" "$f" >/dev/null 2>&1; then
              echo "DRIFT: $f differs from $canonical"
              diff "$canonical" "$f" || true
              drift=1
            fi
          done
          if [[ "$drift" -eq 1 ]]; then
            echo "Fix: copy the canonical common.sh to all skill directories"
            exit 1
          fi
          echo "All common.sh files are in sync"

  conventional-commits:
    name: Conventional Commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: cocogitto/cocogitto-action@v4
        with:
          command: check

  all-checks:
    name: All Checks
    if: always()
    needs:
      - lint
      - common-sh-sync
      - conventional-commits
    runs-on: ubuntu-latest
    steps:
      - name: Verify all checks passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]] || \
             [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more checks failed or were cancelled"
            exit 1
          fi
          echo "All checks passed"
